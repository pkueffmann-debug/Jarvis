name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PortAudio (pyaudio C dep)
        run: brew install portaudio

      - name: Build Wake Word binary (PyInstaller --onedir)
        run: npm run build:wakeword

      - name: Build Vite
        run: npm run build

      - name: Build DMG (arm64 + x64)
        run: npx electron-builder --mac dmg --arm64 --x64 --config -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate .ico
        run: node scripts/create-ico.js

      - name: Build Wake Word binary (PyInstaller --onedir)
        run: npm run build:wakeword

      - name: Build Vite
        run: npm run build

      - name: Build Windows NSIS Installer + Portable
        run: npx electron-builder --win --config -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*Setup*.exe
            dist/*Portable*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
