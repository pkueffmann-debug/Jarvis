name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Mac is split into two arch-specific jobs because the OWW wake-word binary
  # is built natively (PyInstaller) and can't be cross-compiled — each runner
  # must produce the OWW binary matching its own arch. Combining them into
  # one job would bundle the host's OWW arch into both DMGs and break the
  # other Mac platform.
  build-mac-arm64:
    runs-on: macos-latest   # arm64 (Apple Silicon)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PortAudio (pyaudio C dep)
        run: brew install portaudio

      - name: Build Wake Word binary (PyInstaller --onedir, arm64)
        run: npm run build:wakeword

      - name: Build Vite
        run: npm run build

      - name: Build DMG (arm64)
        run: npx electron-builder --mac dmg --arm64 --config -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS arm64 release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac-x64:
    runs-on: macos-13       # last Intel runner GH provides
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install PortAudio (pyaudio C dep)
        run: brew install portaudio

      - name: Build Wake Word binary (PyInstaller --onedir, x64)
        run: npm run build:wakeword

      - name: Build Vite
        run: npm run build

      - name: Build DMG (x64)
        run: npx electron-builder --mac dmg --x64 --config -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS x64 release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate .ico
        run: node scripts/create-ico.js

      - name: Build Wake Word binary (PyInstaller --onedir)
        run: npm run build:wakeword

      - name: Build Vite
        run: npm run build

      - name: Build Windows NSIS Installer + Portable
        run: npx electron-builder --win --config -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*Setup*.exe
            dist/*Portable*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
