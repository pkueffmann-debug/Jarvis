<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Anmelden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #080808;
      --surface: #0e0e14;
      --surface-2: #15151c;
      --border: rgba(255,255,255,0.08);
      --border-2: rgba(255,255,255,0.16);
      --text: #fff;
      --text-2: #A1A1AA;
      --text-3: #52525B;
      --accent: #6366F1;
      --accent-hover: #818CF8;
      --cyan: #22D3EE;
      --radius: 14px;
      --red: #ef4444;
      --green: #22C55E;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    .logo {
      font-size: 20px; font-weight: 800; letter-spacing: 0.12em;
      margin-bottom: 32px; text-decoration: none; color: var(--text);
    }
    .logo span { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%; max-width: 460px;
      padding: 36px 28px;
      display: flex; flex-direction: column; gap: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }
    .card-title { font-size: 22px; font-weight: 700; text-align: center; letter-spacing: -0.01em; }
    .card-subtitle { font-size: 14px; color: var(--text-2); text-align: center; line-height: 1.45; margin-top: -8px; }
    .card-subtitle strong { color: var(--text); font-weight: 600; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--text-2); }
    .form-group input {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      color: var(--text); font-size: 14px; font-family: inherit;
      transition: border-color 0.2s; width: 100%;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }

    .btn {
      width: 100%; padding: 13px;
      background: var(--accent); border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 10px 24px rgba(99,102,241,0.3); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-ghost {
      background: transparent; color: var(--text-2);
      border: 1px solid var(--border-2);
      padding: 11px;
    }
    .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.04); color: var(--text); box-shadow: none; }
    .btn .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: -3px; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { height: 1px; background: var(--border); }
    .links { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .links a { font-size: 13px; color: var(--text-2); cursor: pointer; }
    .links a:hover { color: var(--text); }

    .msg {
      font-size: 13px; text-align: center; padding: 10px 14px;
      border-radius: 8px; display: none;
    }
    .msg.error   { background: rgba(239,68,68,0.10); color: var(--red);   border: 1px solid rgba(239,68,68,0.25); }
    .msg.success { background: rgba(34,197,94,0.10); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }

    .view { display: none; flex-direction: column; gap: 18px; width: 100%; }
    .view.active { display: flex; }

    /* OTP boxes — iPhone-2FA style */
    .otp {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 8px 0 4px;
    }
    .otp-box {
      width: 42px; height: 52px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      font-family: 'Inter', sans-serif;
      caret-color: var(--cyan);
      transition: border-color 0.2s, background 0.25s, transform 0.2s, box-shadow 0.2s;
    }
    .otp-box:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
    }
    .otp-box.filled {
      border-color: rgba(99,102,241,0.55);
      background: rgba(99,102,241,0.08);
    }
    .otp.success .otp-box {
      border-color: var(--green);
      background: rgba(34,197,94,0.12);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
    }
    .otp.error .otp-box {
      border-color: var(--red);
      background: rgba(239,68,68,0.12);
    }
    .otp.shake { animation: shake 0.45s cubic-bezier(.36,.07,.19,.97); }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%, 55% { transform: translateX(-9px); }
      30%, 70% { transform: translateX(9px); }
      85%      { transform: translateX(-4px); }
    }

    .resend-hint {
      font-size: 13px; color: var(--text-3); text-align: center;
    }
    .resend-hint .timer { color: var(--text-2); }
    .resend-hint a.resend.disabled { color: var(--text-3); pointer-events: none; }

    @media (max-width: 460px) {
      .card { padding: 30px 18px; }
      .otp { gap: 5px; }
      .otp-box { width: 34px; height: 46px; font-size: 18px; border-radius: 8px; }
    }
    @media (max-width: 340px) {
      .otp { gap: 4px; }
      .otp-box { width: 30px; height: 42px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <a class="logo" href="/">JAR<span>VIS</span></a>

  <div class="card">

    <!-- ── STEP 1 — Email entry ───────────────────────────────────────── -->
    <div id="view-email" class="view active">
      <h1 class="card-title">Anmelden</h1>
      <p class="card-subtitle">Wir schicken dir einen 8-stelligen Code per E-Mail.</p>
      <div class="msg" id="email-msg"></div>
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="email-input" placeholder="du@beispiel.de" autocomplete="email" autofocus>
      </div>
      <button class="btn" id="send-code-btn">Code senden</button>
      <div class="divider"></div>
      <div class="links">
        <a href="/">← Zurück zur Startseite</a>
      </div>
    </div>

    <!-- ── STEP 2 — OTP entry ─────────────────────────────────────────── -->
    <div id="view-otp" class="view">
      <h1 class="card-title">Code eingeben</h1>
      <p class="card-subtitle">Wir haben einen 8-stelligen Code an <strong id="otp-target"></strong> geschickt.</p>
      <div class="msg" id="otp-msg"></div>

      <div class="otp" id="otp-boxes" aria-label="8-stelliger Bestätigungscode">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Stelle 1">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Stelle 2">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Stelle 3">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Stelle 4">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Stelle 5">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Stelle 6">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Stelle 7">
        <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Stelle 8">
      </div>

      <button class="btn" id="verify-btn" disabled>Bestätigen</button>

      <p class="resend-hint">
        <span id="resend-text">Keine Mail bekommen? <a class="resend disabled" id="resend-link">Code erneut senden</a> <span class="timer" id="resend-timer">(30s)</span></span>
      </p>

      <div class="divider"></div>
      <div class="links">
        <a id="back-to-email">← E-Mail ändern</a>
      </div>
    </div>

  </div>

<script>
const SUPABASE_URL = 'https://jhoddyugadidfkycldnr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impob2RkeXVnYWRpZGZreWNsZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0Mjk3NjEsImV4cCI6MjA5NDAwNTc2MX0.9oVlV4Rj8VC_SqQNJBZZxjj17olS0jPX2V-QZ0VP8u8';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Cookie helpers (unchanged from previous version) ────────────────────
// Server-side gates (api/brain.js, api/_lib/auth.js) read sb-access-token
// from a cookie. Mirror Supabase's localStorage session into Secure cookies
// after each successful auth event.
const COOKIE_MAX_AGE = 60 * 60 * 24 * 7; // 7 days
function setSessionCookies(session) {
  if (!session) return;
  const sec = location.protocol === 'https:' ? '; Secure' : '';
  document.cookie = `sb-access-token=${session.access_token}; Path=/; Max-Age=${COOKIE_MAX_AGE}; SameSite=Lax${sec}`;
  if (session.refresh_token) {
    document.cookie = `sb-refresh-token=${session.refresh_token}; Path=/; Max-Age=${COOKIE_MAX_AGE}; SameSite=Lax${sec}`;
  }
}
function clearSessionCookies() {
  document.cookie = 'sb-access-token=; Path=/; Max-Age=0; SameSite=Lax';
  document.cookie = 'sb-refresh-token=; Path=/; Max-Age=0; SameSite=Lax';
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT') clearSessionCookies();
  else if (session)           setSessionCookies(session);
});

// Where do we go after a successful auth event?
function postAuthRedirect(email, session) {
  setSessionCookies(session);
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next');
  if (next === '/brain' || next === '/brain/') {
    window.location.href = '/brain';
    return;
  }
  const checkoutMatch = next && /^checkout-(pro|team|enterprise)(?:-yearly)?$/.exec(next);
  if (checkoutMatch) {
    const plan = checkoutMatch[1];
    const yearly = next.endsWith('-yearly');
    window.location.href = `/?go=checkout-${plan}${yearly ? '-yearly' : ''}`;
    return;
  }
  // Default: /brain — Paul wants the OTP flow to land users in the app, not pricing.
  window.location.href = '/brain';
}

// ── UI helpers ───────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  hideMsg('email-msg'); hideMsg('otp-msg');
}
function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}
function hideMsg(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}
function setLoading(btn, loading, loadingText = 'Bitte warten…') {
  btn.disabled = loading;
  if (loading) {
    btn.dataset.orig = btn.dataset.orig || btn.textContent;
    btn.innerHTML = '<span class="spin"></span>' + loadingText;
  } else {
    btn.textContent = btn.dataset.orig || btn.textContent;
  }
}

// ── State ────────────────────────────────────────────────────────────────
let currentEmail = '';

// ── STEP 1: send OTP ─────────────────────────────────────────────────────
const emailInput  = document.getElementById('email-input');
const sendBtn     = document.getElementById('send-code-btn');

async function sendCode() {
  const email = emailInput.value.trim().toLowerCase();
  hideMsg('email-msg');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showMsg('email-msg', 'error', 'Bitte gib eine gültige E-Mail-Adresse ein.');
    return;
  }

  setLoading(sendBtn, true, 'Code wird gesendet…');
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { shouldCreateUser: true }
  });
  setLoading(sendBtn, false);

  if (error) {
    showMsg('email-msg', 'error', error.message);
    return;
  }

  currentEmail = email;
  document.getElementById('otp-target').textContent = email;
  showView('otp');
  // Focus first OTP box.
  setTimeout(() => otpBoxes[0].focus(), 50);
  startResendTimer();
}

sendBtn.addEventListener('click', sendCode);
emailInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendCode();
});

// ── STEP 2: enter and verify OTP ─────────────────────────────────────────
const otpRow     = document.getElementById('otp-boxes');
const otpBoxes   = Array.from(otpRow.querySelectorAll('.otp-box'));
const verifyBtn  = document.getElementById('verify-btn');

function readCode() {
  return otpBoxes.map(b => b.value).join('');
}
function clearCode() {
  otpBoxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
  otpRow.classList.remove('error', 'success');
  updateVerifyEnabled();
}
function updateVerifyEnabled() {
  verifyBtn.disabled = readCode().length !== 8;
}

otpBoxes.forEach((box, idx) => {
  box.addEventListener('input', (e) => {
    // Strip anything that isn't a digit.
    const v = e.target.value.replace(/\D/g, '').slice(0, 1);
    e.target.value = v;
    e.target.classList.toggle('filled', v.length === 1);
    otpRow.classList.remove('error');

    if (v && idx < otpBoxes.length - 1) {
      otpBoxes[idx + 1].focus();
    }
    updateVerifyEnabled();
    // Auto-verify when all 8 filled.
    if (readCode().length === 8) verifyCode();
  });

  box.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace') {
      if (!box.value && idx > 0) {
        otpBoxes[idx - 1].focus();
        otpBoxes[idx - 1].value = '';
        otpBoxes[idx - 1].classList.remove('filled');
        updateVerifyEnabled();
        e.preventDefault();
      }
    } else if (e.key === 'ArrowLeft' && idx > 0) {
      otpBoxes[idx - 1].focus();
    } else if (e.key === 'ArrowRight' && idx < otpBoxes.length - 1) {
      otpBoxes[idx + 1].focus();
    } else if (e.key === 'Enter') {
      if (readCode().length === 8) verifyCode();
    }
  });

  box.addEventListener('paste', (e) => {
    const text = (e.clipboardData || window.clipboardData).getData('text');
    const digits = (text || '').replace(/\D/g, '').slice(0, 8);
    if (!digits) return;
    e.preventDefault();
    otpBoxes.forEach((b, i) => {
      b.value = digits[i] || '';
      b.classList.toggle('filled', !!digits[i]);
    });
    const lastIdx = Math.min(digits.length, otpBoxes.length) - 1;
    otpBoxes[lastIdx].focus();
    updateVerifyEnabled();
    if (digits.length === 8) verifyCode();
  });

  box.addEventListener('focus', () => box.select());
});

async function verifyCode() {
  const token = readCode();
  if (token.length !== 8) return;
  hideMsg('otp-msg');
  otpRow.classList.remove('error');

  setLoading(verifyBtn, true, 'Wird überprüft…');
  const { data, error } = await sb.auth.verifyOtp({
    email: currentEmail,
    token,
    type: 'email'
  });
  setLoading(verifyBtn, false);

  if (error) {
    // Shake + red + clear, but keep email step intact.
    otpRow.classList.add('error', 'shake');
    setTimeout(() => otpRow.classList.remove('shake'), 500);
    showMsg('otp-msg', 'error',
      error.message.toLowerCase().includes('expired') || error.message.toLowerCase().includes('invalid')
        ? 'Falscher oder abgelaufener Code. Bitte erneut versuchen.'
        : error.message);
    // Clear and refocus first box after a moment.
    setTimeout(() => {
      clearCode();
      otpBoxes[0].focus();
    }, 600);
    return;
  }

  // Success: green flash, then redirect.
  otpRow.classList.add('success');
  setTimeout(() => postAuthRedirect(currentEmail, data.session), 450);
}

verifyBtn.addEventListener('click', verifyCode);

// ── Resend cooldown ──────────────────────────────────────────────────────
const resendLink   = document.getElementById('resend-link');
const resendTimer  = document.getElementById('resend-timer');
let resendInterval = null;

function startResendTimer(seconds = 30) {
  let remaining = seconds;
  resendLink.classList.add('disabled');
  resendTimer.textContent = `(${remaining}s)`;
  clearInterval(resendInterval);
  resendInterval = setInterval(() => {
    remaining -= 1;
    if (remaining <= 0) {
      clearInterval(resendInterval);
      resendLink.classList.remove('disabled');
      resendTimer.textContent = '';
    } else {
      resendTimer.textContent = `(${remaining}s)`;
    }
  }, 1000);
}

resendLink.addEventListener('click', async (e) => {
  e.preventDefault();
  if (resendLink.classList.contains('disabled')) return;
  if (!currentEmail) return;
  hideMsg('otp-msg');
  resendLink.classList.add('disabled');
  const { error } = await sb.auth.signInWithOtp({
    email: currentEmail,
    options: { shouldCreateUser: true }
  });
  if (error) {
    showMsg('otp-msg', 'error', error.message);
    resendLink.classList.remove('disabled');
    return;
  }
  showMsg('otp-msg', 'success', 'Neuer Code gesendet.');
  startResendTimer();
});

document.getElementById('back-to-email').addEventListener('click', (e) => {
  e.preventDefault();
  clearCode();
  showView('email');
  setTimeout(() => emailInput.focus(), 50);
});

// ── Session handling on page load ────────────────────────────────────────
async function handleSession() {
  const params = new URLSearchParams(window.location.search);

  if (params.has('logout')) {
    try { await sb.auth.signOut(); } catch {}
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith('sb-') || k.includes('supabase'))
        .forEach(k => localStorage.removeItem(k));
    } catch {}
    clearSessionCookies();
    history.replaceState({}, '', '/auth.html');
    showMsg('email-msg', 'success', 'Du wurdest abgemeldet.');
    return;
  }

  const { data } = await sb.auth.getSession();
  if (data.session) {
    setSessionCookies(data.session);
    const next = params.get('next');
    if (next) { postAuthRedirect(data.session.user.email, data.session); return; }

    // Already signed in, no next= → show a "logged in" view.
    const email = data.session.user.email;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const card = document.querySelector('.card');
    if (!document.getElementById('logged-in-view')) {
      const div = document.createElement('div');
      div.id = 'logged-in-view';
      div.className = 'view active';
      div.innerHTML = `
        <h1 class="card-title">Bereits angemeldet</h1>
        <p class="card-subtitle">${email}</p>
        <a href="/brain" class="btn" style="text-align:center;text-decoration:none;display:block;">Weiter zu JARVIS</a>
        <div class="divider"></div>
        <div class="links"><a href="/auth.html?logout">Abmelden</a></div>
      `;
      card.appendChild(div);
    }
  }
}
handleSession();
</script>
</body>
</html>
