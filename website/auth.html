<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Konto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #000;
      --surface: #0A0A0A;
      --surface-2: #111;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --text-2: #A1A1AA;
      --accent: #6366F1;
      --accent-hover: #818CF8;
      --radius: 12px;
      --red: #f87171;
      --green: #22C55E;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    .logo {
      font-size: 20px; font-weight: 700; letter-spacing: 0.1em;
      margin-bottom: 40px; text-decoration: none; color: var(--text);
    }
    .logo span { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%; max-width: 400px;
      padding: 36px 32px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .card-title { font-size: 22px; font-weight: 700; text-align: center; }
    .card-subtitle { font-size: 14px; color: var(--text-2); text-align: center; margin-top: -12px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--text-2); }
    .form-group input {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      color: var(--text); font-size: 14px; font-family: inherit;
      transition: border-color 0.2s; width: 100%;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }

    .btn {
      width: 100%; padding: 12px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider { height: 1px; background: var(--border); }
    .links { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .links a { font-size: 13px; color: var(--text-2); }
    .links a:hover { color: var(--text); }

    .msg {
      font-size: 13px; text-align: center; padding: 10px 14px;
      border-radius: 8px; display: none;
    }
    .msg.error { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .msg.success { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }

    /* View switching */
    .view { display: none; flex-direction: column; gap: 16px; width: 100%; }
    .view.active { display: flex; }
  </style>
</head>
<body>
  <a class="logo" href="/">JAR<span>VIS</span></a>

  <div class="card">
    <div id="view-login" class="view active">
      <h1 class="card-title">Anmelden</h1>
      <p class="card-subtitle">Mit deinem JARVIS-Konto anmelden</p>
      <div class="msg" id="login-msg"></div>
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="login-email" placeholder="du@beispiel.de" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="login-btn">Anmelden</button>
      <div class="divider"></div>
      <div class="links">
        <a href="#" onclick="showView('reset')">Passwort vergessen?</a>
        <a href="#" onclick="showView('signup')">Noch kein Konto? Registrieren</a>
      </div>
    </div>

    <div id="view-signup" class="view">
      <h1 class="card-title">Registrieren</h1>
      <p class="card-subtitle">Konto erstellen und Lizenz kaufen</p>
      <div class="msg" id="signup-msg"></div>
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="signup-email" placeholder="du@beispiel.de" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" id="signup-password" placeholder="Min. 8 Zeichen" autocomplete="new-password">
      </div>
      <button class="btn" id="signup-btn">Konto erstellen</button>
      <div class="divider"></div>
      <div class="links">
        <a href="#" onclick="showView('login')">Bereits registriert? Anmelden</a>
      </div>
    </div>

    <div id="view-reset" class="view">
      <h1 class="card-title">Passwort zurücksetzen</h1>
      <p class="card-subtitle">Wir senden dir einen Link per E-Mail</p>
      <div class="msg" id="reset-msg"></div>
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="reset-email" placeholder="du@beispiel.de" autocomplete="email">
      </div>
      <button class="btn" id="reset-btn">Link senden</button>
      <div class="divider"></div>
      <div class="links">
        <a href="#" onclick="showView('login')">← Zurück zur Anmeldung</a>
      </div>
    </div>
  </div>

  <p style="margin-top:24px; font-size:13px; color:#52525B;">
    <a href="/">← Zurück zur Startseite</a>
  </p>

<script>
// Replace with your actual Supabase project URL and anon key
const SUPABASE_URL = 'https://jhoddyugadidfkycldnr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impob2RkeXVnYWRpZGZreWNsZG5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0Mjk3NjEsImV4cCI6MjA5NDAwNTc2MX0.9oVlV4Rj8VC_SqQNJBZZxjj17olS0jPX2V-QZ0VP8u8';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Cookie helpers — bridge Supabase session into server-side gates ──────
// Server-side gates (api/brain.js) need to read sb-access-token from a
// cookie. Supabase JS stores it in localStorage by default; we mirror it
// into a Secure cookie after each successful auth event.
const COOKIE_MAX_AGE = 60 * 60 * 24 * 7;  // 7 days
function setSessionCookies(session) {
  if (!session) return;
  const sec = location.protocol === 'https:' ? '; Secure' : '';
  document.cookie = `sb-access-token=${session.access_token}; Path=/; Max-Age=${COOKIE_MAX_AGE}; SameSite=Lax${sec}`;
  if (session.refresh_token) {
    document.cookie = `sb-refresh-token=${session.refresh_token}; Path=/; Max-Age=${COOKIE_MAX_AGE}; SameSite=Lax${sec}`;
  }
}
function clearSessionCookies() {
  document.cookie = 'sb-access-token=; Path=/; Max-Age=0; SameSite=Lax';
  document.cookie = 'sb-refresh-token=; Path=/; Max-Age=0; SameSite=Lax';
}

// Refresh cookies whenever Supabase emits a session update (covers token rotation).
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT') {
    clearSessionCookies();
  } else if (session) {
    setSessionCookies(session);
  }
});

// Where do we go after a successful auth event?
//   ?next=/brain → /brain (the auth-gated app)
//   ?next=checkout-pro|team|enterprise → start Stripe checkout straight away
//   default → /pricing.html?email=…
function postAuthRedirect(email, session) {
  setSessionCookies(session);
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next');
  if (next === '/brain' || next === '/brain/') {
    window.location.href = '/brain';
    return;
  }
  const checkoutMatch = next && /^checkout-(pro|team|enterprise)(?:-yearly)?$/.exec(next);
  if (checkoutMatch) {
    const plan = checkoutMatch[1];
    const yearly = next.endsWith('-yearly');
    // Reuse the landing's startCheckout flow by jumping there with a fragment
    window.location.href = `/?go=checkout-${plan}${yearly ? '-yearly' : ''}`;
    return;
  }
  window.location.href = '/pricing.html?email=' + encodeURIComponent(email);
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

function setLoading(btn, loading) {
  btn.disabled = loading;
  if (loading) btn.dataset.orig = btn.textContent;
  btn.textContent = loading ? 'Bitte warten…' : btn.dataset.orig;
}

// LOGIN
document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');

  if (!email || !password) { showMsg('login-msg', 'error', 'Bitte alle Felder ausfüllen.'); return; }

  setLoading(btn, true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  setLoading(btn, false);

  if (error) {
    const msg = error.message.toLowerCase().includes('invalid') || error.message.toLowerCase().includes('credentials')
      ? 'E-Mail oder Passwort falsch. Falls du dich gerade registriert hast, bitte zuerst die Bestätigungs-E-Mail öffnen.'
      : error.message;
    showMsg('login-msg', 'error', msg);
  } else {
    postAuthRedirect(email, data.session);
  }
});

// SIGNUP
document.getElementById('signup-btn').addEventListener('click', async () => {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const btn = document.getElementById('signup-btn');

  if (!email || !password) { showMsg('signup-msg', 'error', 'Bitte alle Felder ausfüllen.'); return; }
  if (password.length < 8) { showMsg('signup-msg', 'error', 'Passwort muss mindestens 8 Zeichen haben.'); return; }

  setLoading(btn, true);
  const { data, error } = await sb.auth.signUp({ email, password });
  setLoading(btn, false);

  if (error) {
    showMsg('signup-msg', 'error', error.message);
  } else if (data.user && !data.session) {
    showMsg('signup-msg', 'success', 'Bestätigungs-E-Mail gesendet. Bitte E-Mail bestätigen, dann anmelden.');
  } else {
    postAuthRedirect(email, data.session);
  }
});

// RESET
document.getElementById('reset-btn').addEventListener('click', async () => {
  const email = document.getElementById('reset-email').value.trim();
  const btn = document.getElementById('reset-btn');

  if (!email) { showMsg('reset-msg', 'error', 'Bitte E-Mail eingeben.'); return; }

  setLoading(btn, true);
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth.html',
  });
  setLoading(btn, false);

  if (error) {
    showMsg('reset-msg', 'error', error.message);
  } else {
    showMsg('reset-msg', 'success', 'Link gesendet. Bitte E-Mail prüfen.');
  }
});

// Handle Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.view.active');
  const btn = active.querySelector('.btn');
  if (btn) btn.click();
});

// ── Session handling ──────────────────────────────────────────────────────────
// `?logout` in URL: sign out, clear storage, drop the param, show login form
async function handleSession() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('logout')) {
    try { await sb.auth.signOut(); } catch {}
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith('sb-') || k.includes('supabase'))
        .forEach(k => localStorage.removeItem(k));
    } catch {}
    clearSessionCookies();
    history.replaceState({}, '', '/auth.html');
    showMsg('login-msg', 'success', 'Sie wurden abgemeldet, Sir.');
    return;
  }
  const { data } = await sb.auth.getSession();
  if (data.session) {
    // Always refresh the cookie when a session is present (handles
    // page refresh after token rotation).
    setSessionCookies(data.session);
    // If a ?next= is set, just go there instead of showing the "already
    // signed in" card — most callers want to be passed through.
    const next = params.get('next');
    if (next) { postAuthRedirect(data.session.user.email, data.session); return; }

    const email = data.session.user.email;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const card = document.querySelector('.card');
    const existing = document.getElementById('logged-in-view');
    if (!existing) {
      const div = document.createElement('div');
      div.id = 'logged-in-view';
      div.className = 'view active';
      div.innerHTML = `
        <h1 class="card-title">Bereits angemeldet</h1>
        <p class="card-subtitle">${email}</p>
        <a href="/pricing.html?email=${encodeURIComponent(email)}" class="btn" style="text-align:center;text-decoration:none;display:block;">Weiter zu Pricing</a>
        <div class="divider"></div>
        <div class="links">
          <a href="/auth.html?logout">Abmelden</a>
        </div>
      `;
      card.appendChild(div);
    }
  }
}
handleSession();
</script>
</body>
</html>
