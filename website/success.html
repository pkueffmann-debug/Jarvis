<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JARVIS — Zahlung erfolgreich</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06060C;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
.card{background:#0D0D18;border:1px solid rgba(99,102,241,.25);border-radius:24px;padding:56px 48px;text-align:center;max-width:480px;width:100%;box-shadow:0 0 60px rgba(99,102,241,.15);}
.check{width:72px;height:72px;border-radius:50%;background:rgba(16,185,129,.15);border:2px solid rgba(16,185,129,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:32px;}
h1{font-size:28px;font-weight:800;margin-bottom:12px}
p{color:#94A3B8;font-size:15px;line-height:1.6;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#6366F1,#818CF8);color:#fff;font-size:15px;font-weight:600;text-decoration:none;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,.4);transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(99,102,241,.5)}
.note{margin-top:20px;font-size:13px;color:#64748B}
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1>Willkommen, Sir.</h1>
  <p id="msg">Zahlung bestätigt. Sie werden in <span id="cd">5</span> Sekunden zu JARVIS weitergeleitet.</p>
  <a href="/brain" class="btn">
    <span>Jetzt zu JARVIS</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  </a>
  <p class="note" style="margin-top:18px;">
    Oder die Desktop-App: <a href="/download/JARVIS-latest.dmg" style="color:#A5B4FC;">JARVIS.dmg herunterladen</a>
  </p>
</div>
<script>
// Stripe webhooks can land a fraction of a second after the success
// redirect. We wait a bit so the auth gate finds an active row.
let n = 5;
const cd = document.getElementById('cd');
const t = setInterval(() => {
  n -= 1;
  if (cd) cd.textContent = n;
  if (n <= 0) { clearInterval(t); window.location.href = '/brain'; }
}, 1000);
</script>
</body>
</html>
